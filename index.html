<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kenji Yamamoto — Head of Technology | AI, Fintech &amp; Platform Engineering</title>
<meta name="description" content="Kenji Yamamoto — Head of Technology. AI, Fintech & Platform Engineering. Leading scalable engineering teams, product innovation and technology strategy.">
<meta name="author" content="Kenji Yamamoto">
<meta property="og:title" content="Kenji Yamamoto — Head of Technology">
<meta property="og:description" content="AI, Fintech & Platform Engineering. Leading scalable engineering teams, product innovation and technology strategy.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://kenjiyamamoto.com/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0f14; --card:#141c29; --border:#22304433;
    --text:#e8edf4; --muted:#94a3b8; --accent:#38bdf8;
    --shadow:0 10px 30px rgba(0,0,0,.35);
    --grad:linear-gradient(135deg,#38bdf8,#818cf8);
  }
  html[data-theme="light"]{
    --bg:#f8fafc; --card:#ffffff; --border:#0f172a14;
    --text:#0f172a; --muted:#55657a; --accent:#0284c7;
    --shadow:0 10px 30px rgba(15,23,42,.08);
    --grad:linear-gradient(135deg,#0284c7,#6366f1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    line-height:1.6; transition:background .3s,color .3s;
    min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column;
    position:relative; overflow-x:hidden;
  }
  .glow{
    position:fixed; inset:auto -30% -50% -30%; height:65%;
    background:radial-gradient(ellipse at center,color-mix(in srgb,var(--accent) 16%,transparent),transparent 70%);
    pointer-events:none;
  }
  #themeToggle{
    position:fixed; top:20px; right:20px; z-index:10;
    cursor:pointer; border:1px solid var(--border); background:var(--card); color:var(--text);
    border-radius:999px; width:40px; height:40px; font-size:1.05rem;
    display:grid; place-items:center; box-shadow:var(--shadow);
  }
  main{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:48px 24px;
  }
  .kicker{
    font-family:'JetBrains Mono',monospace; color:var(--accent);
    font-size:.82rem; letter-spacing:.14em; text-transform:uppercase; margin-bottom:20px;
  }
  h1{font-size:clamp(2.6rem,8vw,4.2rem); font-weight:800; letter-spacing:-2px; line-height:1.05}
  h1 span{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .headline{
    font-size:clamp(1rem,2.6vw,1.25rem); color:var(--muted);
    margin:20px auto 10px; max-width:560px;
  }
  .location{color:var(--muted); font-size:.95rem; margin-bottom:36px}
  .cta{display:flex; gap:14px; flex-wrap:wrap; justify-content:center}
  .btn{
    display:inline-flex; align-items:center; gap:9px; text-decoration:none; font-weight:600; font-size:.95rem;
    padding:13px 26px; border-radius:12px; border:1px solid var(--border); color:var(--text);
    background:var(--card); transition:transform .15s,box-shadow .15s;
  }
  .btn:hover{transform:translateY(-2px); box-shadow:var(--shadow)}
  .btn.primary{background:var(--grad); color:#fff; border:none}
  .btn svg{width:18px; height:18px; fill:currentColor}
  footer{text-align:center; padding:28px 24px; color:var(--muted); font-size:.8rem}
</style>
</head>
<body>

<div class="glow"></div>
<button id="themeToggle" aria-label="Toggle dark/light theme">◐</button>

<main>
  <div class="kicker">Engineering Leadership · AI · Fintech</div>
  <h1>Kenji <span>Yamamoto</span></h1>
  <p class="headline">Head of Technology — AI, Fintech &amp; Platform Engineering. Leading scalable engineering teams, product innovation and technology strategy.</p>
  <p class="location">Rio de Janeiro, Brazil</p>
  <div class="cta">
    <a class="btn primary" href="https://www.linkedin.com/in/kenjiyamamoto/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
      LinkedIn
    </a>
    <a class="btn" href="https://github.com/kenjiyamamoto" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
      GitHub
    </a>
    <a class="btn" href="https://twitter.com/kenjiyamamoto" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.657l-5.214-6.817-5.966 6.817h-3.31l7.73-8.835-8.156-10.665h6.826l4.713 6.231zm-1.161 17.52h1.833l-11.83-15.644h-1.967z"/></svg>
      X / Twitter
    </a>
  </div>
</main>

<footer>© <span id="year"></span> Kenji Yamamoto · kenjiyamamoto.com</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
  const root = document.documentElement;
  const btn = document.getElementById('themeToggle');
  const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
  let theme = prefersLight ? 'light' : 'dark';
  apply(theme);
  btn.addEventListener('click', () => { theme = theme === 'dark' ? 'light' : 'dark'; apply(theme); });
  function apply(t){
    if (t === 'light') root.setAttribute('data-theme','light');
    else root.removeAttribute('data-theme');
    btn.textContent = t === 'light' ? '☾' : '☀';
  }
</script>

</body>
</html>
